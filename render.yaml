services:
  - type: web
    name: hostel-backend-api
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: file:/opt/render/project/src/server/data/prod.db
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
